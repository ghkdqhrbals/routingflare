<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">RoutingFlare DNS and Settings screen</title>
  <desc id="desc">A macOS menu bar app dropdown showing DNS route setup and inbound IP allowlist settings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101719"/>
      <stop offset="1" stop-color="#202824"/>
    </linearGradient>
    <linearGradient id="flare" x1="0" x2="1">
      <stop offset="0" stop-color="#40d6d8"/>
      <stop offset="1" stop-color="#ffa443"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1120" height="760" rx="42" fill="url(#bg)"/>
  <path d="M120 590 C240 420 360 700 500 520 S750 330 980 510" fill="none" stroke="url(#flare)" stroke-width="18" opacity=".22" stroke-linecap="round"/>
  <rect x="110" y="110" width="430" height="540" rx="22" fill="#f7faf9" filter="url(#shadow)"/>
  <rect x="580" y="110" width="430" height="540" rx="22" fill="#f7faf9" filter="url(#shadow)"/>
  <g transform="translate(146 154)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="760" fill="#182523">DNS routes</text>
    <text x="0" y="36" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#71807b">Map fixed hostnames to local dev ports.</text>
    <g transform="translate(0 80)">
      <rect width="358" height="38" rx="9" fill="#dde6e2"/>
      <text x="57" y="24" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#5f6e69">Quick URL</text>
      <rect x="120" y="2" width="116" height="34" rx="8" fill="#fff"/>
      <text x="165" y="24" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#172321">DNS</text>
      <text x="280" y="24" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#5f6e69">Settings</text>
    </g>
    <g transform="translate(0 158)">
      <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#71807b">Add DNS Route</text>
      <rect x="0" y="18" width="152" height="36" rx="8" fill="#fff" stroke="#d0d8d5"/>
      <text x="14" y="41" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#1b2926">dev.example.com</text>
      <rect x="160" y="18" width="66" height="36" rx="8" fill="#fff" stroke="#d0d8d5"/>
      <text x="176" y="41" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#1b2926">8989</text>
      <rect x="234" y="18" width="88" height="36" rx="8" fill="#fff" stroke="#d0d8d5"/>
      <text x="249" y="41" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#1b2926">/console</text>
      <rect x="332" y="18" width="36" height="36" rx="9" fill="#162421"/>
      <text x="345" y="42" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" fill="#fff">+</text>
    </g>
    <g transform="translate(0 260)">
      <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#71807b">Tunnel</text>
      <rect x="0" y="18" width="368" height="36" rx="8" fill="#fff" stroke="#d0d8d5"/>
      <text x="15" y="41" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#61716c">24c83c3f-3c20-402f-...</text>
      <rect x="0" y="66" width="368" height="36" rx="8" fill="#fff" stroke="#d0d8d5"/>
      <text x="15" y="89" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#61716c">~/.cloudflared/&lt;id&gt;.json</text>
    </g>
  </g>
  <g transform="translate(616 154)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="760" fill="#182523">Settings</text>
    <text x="0" y="36" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#71807b">Manage inbound IP access without editing tunnel config.</text>
    <g transform="translate(0 80)">
      <rect width="358" height="38" rx="9" fill="#dde6e2"/>
      <text x="57" y="24" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#5f6e69">Quick URL</text>
      <text x="165" y="24" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#5f6e69">DNS</text>
      <rect x="238" y="2" width="118" height="34" rx="8" fill="#fff"/>
      <text x="277" y="24" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#172321">Settings</text>
    </g>
    <g transform="translate(0 158)">
      <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#71807b">Inbound IP Allowlist</text>
      <rect x="0" y="18" width="314" height="36" rx="8" fill="#fff" stroke="#d0d8d5"/>
      <text x="14" y="41" font-family="SF Mono,Menlo,monospace" font-size="13" fill="#1b2926">203.0.113.10</text>
      <rect x="324" y="18" width="36" height="36" rx="9" fill="#162421"/>
      <text x="337" y="42" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" fill="#fff">+</text>
      <g transform="translate(0 82)">
        <circle cx="4" cy="9" r="4" fill="#27cc76"/>
        <text x="18" y="14" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#33413d">203.0.113.10</text>
      </g>
      <g transform="translate(0 112)">
        <circle cx="4" cy="9" r="4" fill="#27cc76"/>
        <text x="18" y="14" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#33413d">198.51.100.0/24</text>
      </g>
    </g>
  </g>
</svg>
