<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="760" viewBox="0 0 1120 760" role="img" aria-labelledby="title desc">
  <title id="title">RoutingFlare Quick URL screen</title>
  <desc id="desc">A macOS menu bar app dropdown showing routes, Quick URL tab, port and path inputs, and a start button.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1518"/>
      <stop offset="1" stop-color="#182225"/>
    </linearGradient>
    <linearGradient id="flare" x1="0" x2="1">
      <stop offset="0" stop-color="#32d4d7"/>
      <stop offset="1" stop-color="#ff9a3c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1120" height="760" rx="42" fill="url(#bg)"/>
  <circle cx="930" cy="120" r="190" fill="none" stroke="url(#flare)" stroke-width="34" opacity=".18"/>
  <rect x="270" y="80" width="580" height="620" rx="22" fill="#f7faf9" filter="url(#shadow)"/>
  <rect x="270" y="80" width="580" height="58" rx="22" fill="#ebf0ee"/>
  <circle cx="304" cy="109" r="7" fill="#ff605c"/>
  <circle cx="328" cy="109" r="7" fill="#ffbd44"/>
  <circle cx="352" cy="109" r="7" fill="#00ca4e"/>
  <text x="402" y="116" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="16" font-weight="700" fill="#21302f">RoutingFlare</text>
  <g transform="translate(310 168)">
    <circle cx="11" cy="11" r="6" fill="#2bcf77"/>
    <text x="30" y="16" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="21" font-weight="760" fill="#182523">Open</text>
    <text x="380" y="15" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#66736f">Allow all inbound IPs</text>
  </g>
  <g transform="translate(310 228)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#71807b">Routes</text>
    <g transform="translate(0 24)">
      <circle cx="4" cy="9" r="4" fill="#27cc76"/>
      <text x="18" y="14" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#33413d">amber-node.trycloudflare.com/console → 127.0.0.1:8989</text>
    </g>
    <g transform="translate(0 54)">
      <circle cx="4" cy="9" r="4" fill="#9ba6a2"/>
      <text x="18" y="14" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#54615d">amber-node.trycloudflare.com/scalar → 127.0.0.1:8080</text>
    </g>
  </g>
  <g transform="translate(310 332)">
    <rect width="500" height="38" rx="9" fill="#dde6e2"/>
    <rect x="2" y="2" width="164" height="34" rx="8" fill="#fff"/>
    <text x="54" y="24" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#172321">Quick URL</text>
    <text x="232" y="24" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#5f6e69">DNS</text>
    <text x="386" y="24" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#5f6e69">Settings</text>
  </g>
  <g transform="translate(310 402)">
    <text x="0" y="0" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" fill="#71807b">Add Quick Route</text>
    <rect x="0" y="18" width="78" height="36" rx="8" fill="#fff" stroke="#d0d8d5"/>
    <text x="17" y="41" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#1b2926">8989</text>
    <rect x="88" y="18" width="342" height="36" rx="8" fill="#fff" stroke="#d0d8d5"/>
    <text x="107" y="41" font-family="SF Mono,Menlo,monospace" font-size="14" fill="#1b2926">/console</text>
    <rect x="442" y="18" width="42" height="36" rx="9" fill="#162421"/>
    <text x="457" y="42" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#fff">+</text>
  </g>
  <g transform="translate(310 510)">
    <rect width="126" height="42" rx="10" fill="#172421"/>
    <text x="36" y="27" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="15" font-weight="700" fill="#fff">Start</text>
  </g>
</svg>
